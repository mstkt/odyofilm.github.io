<div class="filter-bar" id="filter-bar">
  <div class="year-group">
    <button class="filter-btn year-btn active" data-value="">all</button>
    {% assign year_list = "2023,2022,2021,2020,2019,2018,2017,2016,2015,2014,2012,2010" | split: "," %}
    {% for year in year_list %}
      <button class="filter-btn year-btn" data-value="{{ year }}">{{ year }}</button>
    {% endfor %}
  </div>
  <div class="filter-actions">
    <input type="text" id="filter-search" placeholder="search..." autocomplete="off">
    <button class="filter-random" onclick="heyLook()">random</button>
  </div>
  <span class="filter-count" id="filter-count"></span>
</div>

<div class="toolbar">
  <div class="year-filter">
    <select onchange="if(this.value) window.location=this.value" aria-label="Yıla göre filtrele">
      <option value="">FILTER BY YEAR ▾</option>
      {% assign sorted_cats = site.categories | sort | reverse %}
      {% for cat in sorted_cats %}
        {% assign cat_name = cat | first %}
        {% assign y = cat_name | plus: 0 %}
        {% if y > 2000 %}
          <option value="{{ '/kategori/' | append: cat_name | append: '/' | relative_url }}"
            {% if page.category == cat_name %}selected{% endif %}>{{ cat_name }}</option>
        {% endif %}
      {% endfor %}
    </select>
  </div>
  {% if include.show_hey_look %}
  <button class="hey-look" onclick="heyLook()">hey look.</button>
  {% endif %}
</div>

<div class="toolbar">
  <div class="year-filter">
    <select onchange="if(this.value) window.location=this.value" aria-label="Yıla göre filtrele">
      <option value="">FILTER BY YEAR ▾</option>
      {% assign year_list = "2023,2022,2021,2020,2019,2018,2017,2016,2015,2014,2012,2010" | split: "," %}
      {% for year in year_list %}
        <option value="{{ '/kategori/' | append: year | append: '/' | relative_url }}"
          {% if page.category == year %}selected{% endif %}>{{ year }}</option>
      {% endfor %}
    </select>
  </div>
  {% if include.show_hey_look %}
  <button class="hey-look" onclick="heyLook()">hey look.</button>
  {% endif %}
</div>

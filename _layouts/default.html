<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% seo %}
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">ana sayfa</a>
        {% assign cats = site.categories | sort %}
        {% for cat in cats limit:8 %}
          {% unless cat[0] == "Uncategorized" or cat[0] == "ackopek" %}
            <a href="{{ '/kategori/' | append: cat[0] | slugify | append: '/' | relative_url }}">{{ cat[0] }}</a>
          {% endunless %}
        {% endfor %}
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>{{ site.title }} &mdash; {{ site.description }}</p>
    </div>
  </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != false %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v=5">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% seo %}
</head>
<body>

  <header class="site-header">
    <div class="logo-wrap">
      <a href="{{ '/' | relative_url }}" class="logo-link">
        <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="odyofilm. — music videos that tells a story" class="site-logo-img">
      </a>
    </div>
    <nav class="site-nav">
      <div class="nav-inner">
        <a href="{{ '/kategori/short-film/' | relative_url }}"{% if page.category == 'short film' %} class="active"{% endif %}>short film.</a>
        <a href="{{ '/kategori/animation/' | relative_url }}"{% if page.category == 'animation' %} class="active"{% endif %}>animated ones.</a>
        <a href="{{ '/kategori/vfx/' | relative_url }}"{% if page.category == 'vfx' %} class="active"{% endif %}>vfx ones.</a>
        <a href="{{ '/' | relative_url }}"{% unless page.category or page.tag or page.url contains 'search' or page.url contains 'about' or page.url contains 'tags' %} class="active"{% endunless %}>all of em.</a>
        <a href="{{ '/about/' | relative_url }}"{% if page.url contains 'about' %} class="active"{% endif %}>about.</a>
        <a href="{{ '/search/' | relative_url }}" class="search-icon" aria-label="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </a>
      </div>
    </nav>
  </header>

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>{{ site.title }} &mdash; music videos that tell a story</p>
    </div>
  </footer>

  {% include scripts.html %}
</body>
</html>
